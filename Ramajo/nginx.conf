server {
    listen 80;
    server_name ramajo.moteirodev.shop;

    # Mantém a rota para renovação do Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redireciona 🚦 qualquer outro acesso para o HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ramajo.moteirodev.shop;

    ssl_certificate /etc/letsencrypt/live/ramajo.moteirodev.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ramajo.moteirodev.shop/privkey.pem;

    # Encaminha as chamadas da API para o backend Java
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Entrega as telas do seu frontend Vite
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}